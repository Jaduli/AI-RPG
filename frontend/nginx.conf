server {
  # Expose port 80
  listen 80;

  # Serve static files
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # Proxy API requests to the backend.
  # This prevents CORS issues when the frontend and backend 
  # are served from the same origin and provides security benefits 
  # by not exposing the backend directly to web users.
  location /api/ {
    proxy_pass http://backend:5000/api/;

    # Increase timeout to prevent local AI cold start from causing errors
    proxy_read_timeout 120;
    proxy_connect_timeout 120;
    proxy_send_timeout 120;
  }
}