# Local AI + GPU supported compose file (requires compatible NVIDIA GPU and drivers)
# Run with `docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build`
services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/files:/app/files
      - ./backend/data:/app/data
    environment:
      - LOCAL_AI_ENABLED=true
    env_file:
      - .env

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
  ai:
    build: ./ai
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    gpus: all

volumes:
  ollama_data: