# Regular compose file to run without GPU support (no local AI)
# Run with `docker compose up --build`
services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/files:/app/files
      - ./backend/data:/app/data
    environment:
      - LOCAL_AI_ENABLED=false
    env_file:
      - .env

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend